name: CI/CD Pipeline

# Trigger this workflow on every push to the main branch.
# Nothing runs on feature branches — only production-bound code goes through the full pipeline.
on:
  push:
    branches:
      - main

# Minimal top-level permissions. Each job overrides only what it actually needs,
# following the principle of least privilege.
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — TEST
  # Run the full test suite before anything else. If a single test fails the
  # pipeline stops here: no broken image is ever built or deployed.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the runner has access to the source code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the exact Node.js version used in the Dockerfile to keep
      # the test environment consistent with the production image.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Install ALL dependencies (including devDependencies: jest, supertest)
      # because we need them to run the tests. ci ensures a clean, reproducible install.
      - name: Install dependencies
        run: npm ci
        working-directory: app

      # Run the test suite. jest --forceExit ensures the runner does not hang
      # waiting for open handles after the tests complete.
      # If any test fails, this step exits non-zero and the pipeline stops.
      - name: Run tests
        run: npm test
        working-directory: app

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — BUILD & PUSH
  # Only runs if every test passed. Builds the Docker image and pushes it to
  # GitHub Container Registry tagged with the commit SHA for exact traceability.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test  # Hard dependency — this job will not start if 'test' fails.

    # The 'packages: write' permission is required to push images to GHCR.
    # All other permissions remain read-only.
    permissions:
      contents: read
      packages: write

    outputs:
      # Expose the exact image tag so the deploy job can reference it without
      # recomputing the SHA independently.
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      # Check out the repository so the Dockerfile and app source are available.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the short-lived GITHUB_TOKEN
      # that Actions generates automatically. No long-lived credentials needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx to enable BuildKit features (layer caching, etc.)
      # and multi-platform builds if needed in the future.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Derive image tags in lowercase — GHCR requires the full repository path
      # to be lowercase. github.repository may contain uppercase letters
      # (e.g. "Gery44/DeployReady_Assignment"), so we normalise with tr here.
      # Tags the image with the full commit SHA (immutable, traceable) and
      # with 'latest' as a convenience alias for Render to pull.
      - name: Derive image tags
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${REPO_LOWER}"
          SHA_TAG="${IMAGE_BASE}:${{ github.sha }}"
          LATEST_TAG="${IMAGE_BASE}:latest"
          CACHE_TAG="${IMAGE_BASE}:buildcache"
          echo "sha_tag=${SHA_TAG}"       >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "cache_tag=${CACHE_TAG}"   >> "$GITHUB_OUTPUT"
          echo "Image will be tagged as: ${SHA_TAG} and ${LATEST_TAG}"

      # Build the Docker image using the multi-stage Dockerfile and push both tags
      # to GHCR in a single operation. Layer cache is stored in the registry itself
      # so subsequent builds only transfer changed layers.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_tag }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_tag }},mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — DEPLOY
  # Only runs after the image is successfully pushed to GHCR.
  # Triggers a Render deployment by calling the service's deploy hook URL.
  # Render pulls the latest image from GHCR and restarts the service automatically.
  # The deploy hook URL is stored as a GitHub secret — never hardcoded here.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push  # Hard dependency — only deploy a successfully built image.

    steps:
      # Trigger the Render deploy hook. Render will pull the ':latest' image that
      # was just pushed to GHCR in the previous job and restart the service.
      # RENDER_DEPLOY_HOOK is stored as a GitHub repository secret — it contains
      # the full hook URL including the service ID and secret key.
      - name: Trigger Render deployment
        run: |
          echo "Triggering Render deployment for image: ${{ needs.build-and-push.outputs.image_tag }}"
          curl --fail --silent --show-error \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deployment triggered successfully"
