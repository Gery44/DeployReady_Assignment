services:
  app:
    # Build the image from the Dockerfile at the repo root.
    build:
      context: .
      dockerfile: Dockerfile

    # Map host port 3000 → container port defined by PORT env var.
    ports:
      - "3000:${PORT:-3000}"

    # Load environment variables from the .env file in the repo root.
    env_file:
      - .env

    # Restart automatically unless the container is explicitly stopped.
    restart: unless-stopped

    # Docker will poll /health to know when the service is ready.
    # This is surfaced in `docker compose ps` and used by dependent services.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
